<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f5ef" />
    <title>Lumina sin conexion</title>
    <style>
      :root {
        color: #22313f;
        background: #f7f5ef;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      body {
        align-items: center;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      main {
        background: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 8px;
        box-shadow: 0 18px 50px rgba(34, 49, 63, 0.09);
        max-width: 420px;
        padding: 28px;
      }

      h1 {
        font-size: 28px;
        margin: 0 0 10px;
      }

      p {
        color: rgba(34, 49, 63, 0.68);
        font-size: 15px;
        line-height: 1.6;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Lumina</h1>
      <p>No hay conexion disponible. Vuelve a abrir la app cuando tengas red para sincronizar tus datos.</p>
    </main>
  </body>
</html>
